<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listify</title>
    <style>
      :root {
        --preloader-bg: #ffffff;
        --preloader-color: #121212;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --preloader-bg: #121212;
          --preloader-color: #ffffff;
        }
      }
      body {
        margin: 0;
        background-color: var(--preloader-bg);
      }
      .preloader-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: var(--preloader-bg);
      }
      .preloader-circle {
        width: 48px;
        height: 48px;
        background-color: var(--preloader-color);
        border-radius: 50%;
        animation: pulse 1.5s ease-in-out infinite;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }
      .preloader-brand {
        margin-top: 24px;
        font-family: 'Onest', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 500;
        font-size: 1.75rem;
        line-height: 1.6;
        letter-spacing: normal;
        animation: fade 1.5s ease-in-out infinite;
      }
      .preloader-brand .prefix {
        color: #0AC0C0;
      }
      .preloader-brand .suffix {
        color: var(--preloader-color);
        opacity: 0.82;
      }
      @media (prefers-color-scheme: dark) {
        .preloader-circle {
          box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }
      }
      @keyframes pulse {
        0% { transform: scale(0.85); opacity: 0.4; }
        50% { transform: scale(1.15); opacity: 1; }
        100% { transform: scale(0.85); opacity: 0.4; }
      }
      @keyframes fade {
        0% { opacity: 0.5; }
        50% { opacity: 1; }
        100% { opacity: 0.5; }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-6e37e95e.js"></script>

  </head>

      <div class="preloader-container">
        <div class="preloader-circle"></div>
        <div class="preloader-brand">
          <span class="prefix">Li</span><span class="suffix">stify</span>
        </div>
      </div>
    </div>
    
  </body>
</html>
