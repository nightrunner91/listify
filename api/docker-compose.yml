services:
  postgres:
    image: postgres:16-alpine
    container_name: listify_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: listify
      POSTGRES_PASSWORD: listify_secret
      POSTGRES_DB: listify
    ports:
      - "5432:5432"
    volumes:
      - listify_pgdata:/var/lib/postgresql/data

volumes:
  listify_pgdata:
